name: Publish packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build -w packages/core -w packages/moltnumber

      - name: Test
        run: npm test --if-present -w packages/moltnumber

      - name: Publish @moltprotocol/core
        run: |
          LOCAL=$(node -p "require('./packages/core/package.json').version")
          REMOTE=$(npm view @moltprotocol/core version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "⏭ @moltprotocol/core@$LOCAL already published — skipping"
          else
            echo "📦 Publishing @moltprotocol/core@$LOCAL (was $REMOTE)"
            npm publish -w packages/core --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish moltnumber
        run: |
          LOCAL=$(node -p "require('./packages/moltnumber/package.json').version")
          REMOTE=$(npm view moltnumber version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "⏭ moltnumber@$LOCAL already published — skipping"
          else
            echo "📦 Publishing moltnumber@$LOCAL (was $REMOTE)"
            npm publish -w packages/moltnumber --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
